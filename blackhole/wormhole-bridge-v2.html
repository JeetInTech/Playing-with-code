<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wormhole Bridge — File Transfer Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #030010;
      font-family: 'Courier New', monospace;
      user-select: none;
    }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

    /* Drop zone overlay */
    #dropOverlay {
      position: fixed; inset: 0; z-index: 10;
      display: none; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #dropOverlay.active { display: flex; }
    #dropOverlay .ring {
      width: 280px; height: 280px; border-radius: 50%;
      border: 3px solid rgba(200, 160, 255, 0.6);
      box-shadow: 0 0 60px rgba(200, 160, 255, 0.3), inset 0 0 40px rgba(200, 160, 255, 0.15);
      display: flex; align-items: center; justify-content: center;
      animation: pulseRing 1.2s ease-in-out infinite;
    }
    #dropOverlay .ring span {
      color: rgba(220, 200, 255, 0.9); font-size: 13px; letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(200, 160, 255, 0.6); text-align: center;
    }
    @keyframes pulseRing {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    /* File preview floating card */
    #filePreview {
      position: fixed; z-index: 20; display: none;
      background: rgba(10, 5, 30, 0.94); border: 1px solid rgba(180, 140, 255, 0.4);
      border-radius: 12px; padding: 16px; max-width: 420px;
      box-shadow: 0 0 40px rgba(160, 120, 255, 0.25), 0 8px 32px rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      animation: emergeCard 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    #filePreview.show { display: block; }
    #filePreview img { max-width: 100%; max-height: 300px; border-radius: 8px; display: block; margin: 0 auto 12px; }
    #filePreview .file-name { color: rgba(200, 180, 255, 0.9); font-size: 12px; letter-spacing: 1.5px; text-align: center; word-break: break-all; }
    #filePreview .file-size { color: rgba(160, 140, 200, 0.6); font-size: 10px; text-align: center; margin-top: 4px; letter-spacing: 1px; }
    #filePreview .file-actions { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    #filePreview .file-actions button {
      background: rgba(140, 100, 240, 0.15); border: 1px solid rgba(180, 140, 255, 0.3);
      color: rgba(200, 180, 255, 0.9); padding: 6px 16px; border-radius: 6px;
      cursor: pointer; font-family: inherit; font-size: 11px; letter-spacing: 1px; transition: all 0.2s;
    }
    #filePreview .file-actions button:hover { background: rgba(140, 100, 240, 0.3); border-color: rgba(180, 140, 255, 0.6); }
    #filePreview .close-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; color: rgba(200, 180, 255, 0.5); font-size: 18px; cursor: pointer; }
    #filePreview .close-btn:hover { color: rgba(230, 210, 255, 0.9); }
    @keyframes emergeCard {
      0% { transform: scale(0.3) translateY(40px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    #statusBar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 15;
      color: rgba(200, 180, 255, 0.6); font-size: 11px; letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(180, 140, 255, 0.4);
    }
    #peerStatus {
      position: fixed; top: 16px; right: 20px; z-index: 15;
      color: rgba(200, 180, 255, 0.5); font-size: 10px; letter-spacing: 2px;
    }
    #peerStatus .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle;
    }
    #peerStatus .dot.on { background: rgba(100, 255, 180, 0.8); box-shadow: 0 0 8px rgba(100, 255, 180, 0.5); }
    #peerStatus .dot.off { background: rgba(255, 100, 80, 0.6); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="dropOverlay"><div class="ring"><span>DROP FILE<br>INTO WORMHOLE</span></div></div>
  <div id="filePreview"></div>
  <div id="statusBar">DRAG A FILE ONTO THE PORTAL TO TRANSFER</div>
  <div id="peerStatus"><span class="dot off"></span>NO PEER CONNECTED</div>

  <script>
    (() => {
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const dropOverlay = document.getElementById("dropOverlay");
      const filePreview = document.getElementById("filePreview");
      const statusBar = document.getElementById("statusBar");
      const peerStatusEl = document.getElementById("peerStatus");

      let w = 0, h = 0, dpr = 1;

      // === IDENTITY & COMMS ===
      const myId = crypto.randomUUID ? crypto.randomUUID() : String(Math.random()).slice(2);
      const channelName = "wormhole-bridge-v2";
      const bc = ("BroadcastChannel" in window) ? new BroadcastChannel(channelName) : null;
      const peers = new Map();
      const PEER_TTL_MS = 2300;
      let lastSent = null;
      let t = 0;

      // === SPACE BACKGROUND — PRE-RENDERED ===
      const bgCanvas = document.createElement('canvas');
      const bgCtx = bgCanvas.getContext('2d');

      // === STARS ===
      const starCount = 800;
      const stars = [];

      // === BRIDGE STREAMS ===
      const streamCount = 400;
      const streams = [];

      // === FILE TRANSFER STATE ===
      const CHUNK_SIZE = 64 * 1024;
      let transferState = 'idle';
      let transferProgress = 0;
      let transferFileName = '';
      let transferFileType = '';
      let transferFileSize = 0;
      let transferThumbnail = null;

      let outgoingChunks = [];
      let outgoingSentIdx = 0;
      let outgoingTotalChunks = 0;
      let outgoingTransferId = '';

      let incomingChunks = [];
      let incomingTotalChunks = 0;
      let incomingReceived = 0;
      let incomingTransferId = '';
      let incomingFileName = '';
      let incomingFileType = '';
      let incomingFileSize = 0;

      let intakeTimer = 0;
      const INTAKE_DURATION = 1.8;
      let bridgePacketT = -1;
      let bridgePacketDir = 1;
      let emergeTimer = 0;
      const EMERGE_DURATION = 1.2;
      let emergeParticles = [];
      let receivedFileBlob = null;
      let receivedFileUrl = null;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function formatSize(b) {
        if (b < 1024) return b + ' B';
        if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
        return (b / (1024 * 1024)).toFixed(1) + ' MB';
      }

      // === RESIZE ===
      function resize() {
        dpr = window.devicePixelRatio || 1;
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        renderBackground();
      }

      // === PRE-RENDER STATIC BACKGROUND (nebulae + deep stars) ===
      function renderBackground() {
        bgCanvas.width = w; bgCanvas.height = h;

        // Deep space base
        bgCtx.fillStyle = '#030010';
        bgCtx.fillRect(0, 0, w, h);

        // Nebula clouds — large soft colored blobs
        const nebulae = [
          { x: w * 0.15, y: h * 0.25, r: 350, c1: 'rgba(60, 20, 100, 0.35)', c2: 'rgba(40, 10, 70, 0)' },
          { x: w * 0.82, y: h * 0.7, r: 400, c1: 'rgba(100, 30, 80, 0.3)', c2: 'rgba(60, 15, 50, 0)' },
          { x: w * 0.5, y: h * 0.15, r: 300, c1: 'rgba(20, 40, 90, 0.25)', c2: 'rgba(10, 20, 50, 0)' },
          { x: w * 0.3, y: h * 0.8, r: 280, c1: 'rgba(80, 20, 60, 0.2)', c2: 'rgba(40, 10, 30, 0)' },
          { x: w * 0.7, y: h * 0.3, r: 250, c1: 'rgba(30, 60, 120, 0.22)', c2: 'rgba(15, 30, 60, 0)' },
          { x: w * 0.6, y: h * 0.85, r: 200, c1: 'rgba(50, 100, 60, 0.15)', c2: 'rgba(20, 50, 30, 0)' },
          { x: w * 0.1, y: h * 0.6, r: 220, c1: 'rgba(120, 40, 80, 0.18)', c2: 'rgba(60, 20, 40, 0)' },
        ];
        for (const n of nebulae) {
          const g = bgCtx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
          g.addColorStop(0, n.c1);
          g.addColorStop(1, n.c2);
          bgCtx.fillStyle = g;
          bgCtx.fillRect(0, 0, w, h);
        }

        // Small faint nebula wisps
        for (let i = 0; i < 12; i++) {
          const nx = Math.random() * w, ny = Math.random() * h;
          const nr = 60 + Math.random() * 150;
          const hue = Math.random() * 360;
          const g = bgCtx.createRadialGradient(nx, ny, 0, nx, ny, nr);
          g.addColorStop(0, `hsla(${hue}, 60%, 40%, 0.08)`);
          g.addColorStop(1, 'rgba(0,0,0,0)');
          bgCtx.fillStyle = g;
          bgCtx.fillRect(0, 0, w, h);
        }
      }

      function initStars() {
        stars.length = 0;
        for (let i = 0; i < starCount; i++) {
          const isBright = Math.random() < 0.06;
          stars.push({
            x: Math.random() * w, y: Math.random() * h,
            size: isBright ? (2 + Math.random() * 2.5) : (0.3 + Math.random() * 1.5),
            alpha: isBright ? (0.7 + Math.random() * 0.3) : (0.15 + Math.random() * 0.5),
            phase: Math.random() * Math.PI * 2,
            isBright,
            hue: Math.random() > 0.7 ? (200 + Math.random() * 60) : (30 + Math.random() * 30),
          });
        }
      }

      function initStreams() {
        streams.length = 0;
        for (let i = 0; i < streamCount; i++) {
          streams.push({
            f: Math.random(),
            r: (Math.random() - 0.5) * 1.2,
            speed: 0.1 + Math.random() * 0.5,
            phase: Math.random() * Math.PI * 2,
            size: 0.5 + Math.random() * 1.5,
          });
        }
      }

      // === WORLD COORDS ===
      function getWindowCenterWorld() {
        const sx = Number.isFinite(window.screenX) ? window.screenX : 0;
        const sy = Number.isFinite(window.screenY) ? window.screenY : 0;
        return { x: sx + (window.outerWidth || w) * 0.5, y: sy + (window.outerHeight || h) * 0.5 };
      }
      function getViewportWorldOrigin() {
        const sx = Number.isFinite(window.screenX) ? window.screenX : 0;
        const sy = Number.isFinite(window.screenY) ? window.screenY : 0;
        const insetX = Math.max(0, ((window.outerWidth || w) - window.innerWidth) * 0.5);
        const insetY = Math.max(0, (window.outerHeight || h) - window.innerHeight);
        return { x: sx + insetX, y: sy + insetY };
      }
      function worldToLocal(wx, wy) {
        const o = getViewportWorldOrigin();
        return { x: wx - o.x, y: wy - o.y };
      }

      // === PEER COMMUNICATION ===
      function postState() {
        const now = Date.now();
        const p = getWindowCenterWorld();
        let vx = 0, vy = 0;
        if (lastSent) {
          const dt = Math.max(1, now - lastSent.now) / 1000;
          vx = (p.x - lastSent.x) / dt; vy = (p.y - lastSent.y) / dt;
        }
        const payload = { kind: "state", id: myId, now, x: p.x, y: p.y, vx, vy, w: window.outerWidth || w, h: window.outerHeight || h };
        lastSent = payload;
        if (bc) bc.postMessage(payload);
        else localStorage.setItem(channelName, JSON.stringify(payload));
      }

      function onMessage(payload) {
        if (!payload || payload.id === myId) return;
        if (payload.kind === 'state') peers.set(payload.id, payload);
        else if (payload.kind === 'file-start') handleFileStart(payload);
        else if (payload.kind === 'file-chunk') handleFileChunk(payload);
        else if (payload.kind === 'file-complete') handleFileComplete(payload);
      }

      if (bc) { bc.onmessage = (ev) => onMessage(ev.data); }
      else {
        window.addEventListener("storage", (ev) => {
          if (ev.key !== channelName || !ev.newValue) return;
          try { onMessage(JSON.parse(ev.newValue)); } catch (_) {}
        });
      }

      function getNearestPeer(now) {
        const self = getWindowCenterWorld();
        let best = null, bestD2 = Infinity;
        for (const [pid, p] of peers.entries()) {
          if (!p || now - p.now > PEER_TTL_MS) { peers.delete(pid); continue; }
          const dx = p.x - self.x, dy = p.y - self.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < bestD2) { bestD2 = d2; best = p; }
        }
        return best;
      }
      function hasPeer() { return getNearestPeer(Date.now()) !== null; }

      // === FILE TRANSFER: SENDING ===
      function sendFile(file) {
        if (!bc || !hasPeer()) { statusBar.textContent = 'NO PEER CONNECTED — OPEN ANOTHER TAB'; return; }
        if (file.size > 50 * 1024 * 1024) { statusBar.textContent = 'FILE TOO LARGE (MAX 50MB)'; return; }
        transferState = 'intake'; intakeTimer = 0;
        transferFileName = file.name; transferFileType = file.type; transferFileSize = file.size;
        transferProgress = 0; statusBar.textContent = `INTAKE: ${file.name}`;
        if (file.type.startsWith('image/')) {
          const img = new Image(); img.src = URL.createObjectURL(file);
          img.onload = () => { transferThumbnail = img; };
        } else { transferThumbnail = null; }
        const reader = new FileReader();
        reader.onload = () => {
          const buffer = reader.result;
          const totalChunks = Math.ceil(buffer.byteLength / CHUNK_SIZE);
          outgoingChunks = [];
          for (let i = 0; i < totalChunks; i++) {
            outgoingChunks.push(buffer.slice(i * CHUNK_SIZE, Math.min((i + 1) * CHUNK_SIZE, buffer.byteLength)));
          }
          outgoingTotalChunks = totalChunks; outgoingSentIdx = 0;
          outgoingTransferId = crypto.randomUUID ? crypto.randomUUID() : String(Math.random()).slice(2);
        };
        reader.readAsArrayBuffer(file);
      }

      function startSending() {
        if (!bc) return;
        transferState = 'sending'; bridgePacketT = 0; bridgePacketDir = 1;
        bc.postMessage({ kind: 'file-start', id: myId, transferId: outgoingTransferId, fileName: transferFileName, fileType: transferFileType, fileSize: transferFileSize, totalChunks: outgoingTotalChunks });
        let chunkIdx = 0;
        function sendNext() {
          if (chunkIdx >= outgoingTotalChunks) {
            bc.postMessage({ kind: 'file-complete', id: myId, transferId: outgoingTransferId });
            transferProgress = 1; statusBar.textContent = `TRANSMITTED: ${transferFileName}`;
            return;
          }
          bc.postMessage({ kind: 'file-chunk', id: myId, transferId: outgoingTransferId, chunkIdx, data: outgoingChunks[chunkIdx] });
          chunkIdx++; outgoingSentIdx = chunkIdx; transferProgress = chunkIdx / outgoingTotalChunks;
          statusBar.textContent = `TRANSMITTING: ${Math.floor(transferProgress * 100)}%`;
          setTimeout(sendNext, 2);
        }
        sendNext();
      }

      // === FILE TRANSFER: RECEIVING ===
      function handleFileStart(p) {
        incomingTransferId = p.transferId; incomingFileName = p.fileName; incomingFileType = p.fileType;
        incomingFileSize = p.fileSize; incomingTotalChunks = p.totalChunks;
        incomingChunks = new Array(incomingTotalChunks); incomingReceived = 0;
        transferState = 'receiving'; transferProgress = 0; bridgePacketT = 0; bridgePacketDir = -1;
        statusBar.textContent = `RECEIVING: ${incomingFileName}`;
      }
      function handleFileChunk(p) {
        if (p.transferId !== incomingTransferId) return;
        incomingChunks[p.chunkIdx] = p.data; incomingReceived++;
        transferProgress = incomingReceived / incomingTotalChunks;
        statusBar.textContent = `RECEIVING: ${Math.floor(transferProgress * 100)}%`;
      }
      function handleFileComplete(p) {
        if (p.transferId !== incomingTransferId) return;
        const blob = new Blob(incomingChunks, { type: incomingFileType });
        receivedFileBlob = blob; receivedFileUrl = URL.createObjectURL(blob);
        transferState = 'emerge'; emergeTimer = 0; bridgePacketT = -1;
        emergeParticles = [];
        for (let i = 0; i < 80; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 8;
          emergeParticles.push({ x: 0, y: 0, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, size: 1 + Math.random() * 3,
            hue: Math.random() > 0.5 ? (260 + Math.random() * 40) : (30 + Math.random() * 30) });
        }
        statusBar.textContent = `MATERIALIZING: ${incomingFileName}`;
      }

      function displayReceivedFile() {
        transferState = 'display';
        const selfLocal = worldToLocal(...Object.values(getWindowCenterWorld()));
        if (incomingFileType.startsWith('image/')) {
          filePreview.innerHTML = `<button class="close-btn" onclick="closePreview()">×</button>
            <img src="${receivedFileUrl}" alt="${incomingFileName}" />
            <div class="file-name">${incomingFileName}</div><div class="file-size">${formatSize(incomingFileSize)}</div>
            <div class="file-actions"><button onclick="downloadReceived()">⬇ DOWNLOAD</button><button onclick="openInNewTab()">↗ OPEN</button><button onclick="closePreview()">✕ DISMISS</button></div>`;
          filePreview.style.left = Math.max(20, selfLocal.x - 200) + 'px';
          filePreview.style.top = Math.max(20, selfLocal.y + 80) + 'px';
          filePreview.className = 'show';
        } else if (incomingFileType === 'application/pdf') {
          window.open(receivedFileUrl, '_blank');
          filePreview.innerHTML = `<button class="close-btn" onclick="closePreview()">×</button>
            <div class="file-name" style="font-size:14px;margin-bottom:8px">📄 ${incomingFileName}</div>
            <div class="file-size">${formatSize(incomingFileSize)} — Opened in new tab</div>
            <div class="file-actions"><button onclick="downloadReceived()">⬇ DOWNLOAD</button><button onclick="closePreview()">✕ DISMISS</button></div>`;
          filePreview.style.left = Math.max(20, selfLocal.x - 180) + 'px';
          filePreview.style.top = Math.max(20, selfLocal.y + 80) + 'px';
          filePreview.className = 'show';
        } else {
          downloadReceived();
          statusBar.textContent = `DOWNLOADED: ${incomingFileName}`;
          setTimeout(() => { transferState = 'idle'; }, 2000);
        }
      }

      window.downloadReceived = () => { if (!receivedFileUrl) return; const a = document.createElement('a'); a.href = receivedFileUrl; a.download = incomingFileName; a.click(); };
      window.openInNewTab = () => { if (receivedFileUrl) window.open(receivedFileUrl, '_blank'); };
      window.closePreview = () => { filePreview.className = ''; filePreview.innerHTML = ''; transferState = 'idle'; statusBar.textContent = 'DRAG A FILE ONTO THE PORTAL TO TRANSFER'; };

      // === DRAG & DROP ===
      let dragCounter = 0;
      document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active');
        const selfLocal = worldToLocal(...Object.values(getWindowCenterWorld()));
        const ring = dropOverlay.querySelector('.ring');
        ring.style.position = 'absolute'; ring.style.left = (selfLocal.x - 140) + 'px'; ring.style.top = (selfLocal.y - 140) + 'px';
      });
      document.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
      document.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); } });
      document.addEventListener('drop', (e) => { e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('active'); if (e.dataTransfer.files.length > 0) sendFile(e.dataTransfer.files[0]); });

      // ============================================================
      //  DRAWING: DEEP SPACE BACKGROUND
      // ============================================================
      function drawBackground() {
        ctx.drawImage(bgCanvas, 0, 0, w, h);
      }

      function drawStars(localA, localB, lens) {
        for (let i = 0; i < starCount; i++) {
          const s = stars[i];
          let sx = s.x, sy = s.y;

          // Gravitational lensing warp near portals
          const warpOne = (cx, cy, radius, force) => {
            const dx = sx - cx, dy = sy - cy;
            const d = Math.hypot(dx, dy);
            if (d < radius && d > 1) {
              const k = (1 - d / radius) * force;
              sx += (dx / d) * k; sy += (dy / d) * k;
            }
          };
          warpOne(localA.x, localA.y, 280, lens * 18);
          warpOne(localB.x, localB.y, 280, lens * 18);

          const tw = 0.65 + 0.35 * Math.sin(t * 1.4 + s.phase);
          const a = s.alpha * tw;

          if (s.isBright) {
            // Bright stars get a lens flare / glow
            ctx.save();
            ctx.globalAlpha = a * 0.2;
            const flareR = s.size * 6;
            const fg = ctx.createRadialGradient(sx, sy, 0, sx, sy, flareR);
            fg.addColorStop(0, `hsla(${s.hue}, 50%, 90%, 0.5)`);
            fg.addColorStop(0.3, `hsla(${s.hue}, 40%, 70%, 0.15)`);
            fg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = fg;
            ctx.beginPath(); ctx.arc(sx, sy, flareR, 0, Math.PI * 2); ctx.fill();

            // Cross spikes
            ctx.strokeStyle = `hsla(${s.hue}, 40%, 85%, ${a * 0.4})`;
            ctx.lineWidth = 0.5;
            const spikeLen = s.size * 4;
            ctx.beginPath(); ctx.moveTo(sx - spikeLen, sy); ctx.lineTo(sx + spikeLen, sy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(sx, sy - spikeLen); ctx.lineTo(sx, sy + spikeLen); ctx.stroke();
            ctx.restore();
          }

          ctx.globalAlpha = a;
          ctx.fillStyle = `hsla(${s.hue}, 30%, 90%, 1)`;
          ctx.beginPath(); ctx.arc(sx, sy, s.size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // ============================================================
      //  DRAWING: BLACK HOLE with Colored Accretion Disk
      // ============================================================
      function drawBlackHole(cx, cy, spin, isIntaking, intakeP, isEmerging, emergeP, showProgress) {
        const holeR = 50;    // Event horizon radius
        const diskR = 160;   // Accretion disk outer radius

        // === INTAKE / EMERGE GLOW ===
        if (isIntaking) {
          const pulse = 0.5 + 0.5 * Math.sin(t * 8);
          const ig = ctx.createRadialGradient(cx, cy, 10, cx, cy, 260);
          ig.addColorStop(0, `rgba(180, 140, 255, ${0.35 * pulse * (1 - intakeP)})`);
          ig.addColorStop(0.5, `rgba(100, 60, 200, ${0.12 * (1 - intakeP)})`);
          ig.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = ig; ctx.beginPath(); ctx.arc(cx, cy, 260, 0, Math.PI * 2); ctx.fill();
        }
        if (isEmerging) {
          const burstR = 100 + emergeP * 200;
          const ig = ctx.createRadialGradient(cx, cy, 10, cx, cy, burstR);
          ig.addColorStop(0, `rgba(255, 200, 120, ${0.5 * (1 - emergeP)})`);
          ig.addColorStop(0.4, `rgba(200, 140, 255, ${0.3 * (1 - emergeP)})`);
          ig.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = ig; ctx.beginPath(); ctx.arc(cx, cy, burstR, 0, Math.PI * 2); ctx.fill();
        }

        // === OUTER GLOW (gravitational lensing halo) ===
        const outerGlow = ctx.createRadialGradient(cx, cy, holeR, cx, cy, diskR + 80);
        outerGlow.addColorStop(0, 'rgba(0, 0, 0, 0)');
        outerGlow.addColorStop(0.4, 'rgba(80, 50, 160, 0.08)');
        outerGlow.addColorStop(0.7, 'rgba(140, 60, 120, 0.06)');
        outerGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = outerGlow;
        ctx.beginPath(); ctx.arc(cx, cy, diskR + 80, 0, Math.PI * 2); ctx.fill();

        // === ACCRETION DISK — Multiple colored layers ===
        ctx.save();
        ctx.translate(cx, cy);

        // Disk tilt (perspective illipse)
        const tiltY = 0.30;

        // Layer 1: Outer warm glow (pinks/purples)
        ctx.save();
        ctx.scale(1, tiltY);
        const spinRate = isIntaking ? 0.28 : 0.14;
        for (let ring = 0; ring < 12; ring++) {
          const rr = 65 + ring * 9;
          const hue = 280 + ring * 8 + Math.sin(t * 0.5 + ring * 0.3) * 15; // purple → magenta → warm
          const sat = 50 + ring * 3;
          const lit = 55 - ring * 2;
          const alpha = 0.28 - ring * 0.018;
          ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${lit}%, ${Math.max(0.03, alpha)})`;
          ctx.lineWidth = 6 - ring * 0.35;
          ctx.beginPath();
          const startAngle = spin * spinRate + ring * 0.25;
          ctx.arc(0, 0, rr, startAngle, startAngle + Math.PI * 1.7);
          ctx.stroke();
        }
        ctx.restore();

        // Layer 2: Inner hot disk (golds/oranges)
        ctx.save();
        ctx.scale(1, tiltY);
        for (let ring = 0; ring < 8; ring++) {
          const rr = 55 + ring * 5;
          const hue = 35 + ring * 6; // warm gold → orange
          const alpha = 0.35 - ring * 0.035;
          ctx.strokeStyle = `hsla(${hue}, 80%, ${65 - ring * 3}%, ${Math.max(0.05, alpha)})`;
          ctx.lineWidth = 4 - ring * 0.3;
          ctx.beginPath();
          const startAngle = -spin * spinRate * 1.2 + ring * 0.4;
          ctx.arc(0, 0, rr, startAngle, startAngle + Math.PI * 1.4);
          ctx.stroke();
        }
        ctx.restore();

        // Layer 3: Bright upper photon ring (top arc visible above the hole — gravitational lensing)
        ctx.save();
        ctx.scale(1, tiltY * 0.6);
        ctx.rotate(spin * 0.03);
        const photonGlow = ctx.createRadialGradient(0, -15, 20, 0, -15, 95);
        photonGlow.addColorStop(0, 'rgba(255, 245, 230, 0.45)');
        photonGlow.addColorStop(0.5, 'rgba(255, 200, 140, 0.2)');
        photonGlow.addColorStop(1, 'rgba(200, 140, 100, 0)');
        ctx.fillStyle = photonGlow;
        ctx.beginPath(); ctx.ellipse(0, -10, 110, 35, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        // Layer 4: Particle dusting on disk (scattered bright dots)
        ctx.save();
        ctx.scale(1, tiltY);
        for (let i = 0; i < 40; i++) {
          const angle = spin * spinRate * 0.5 + i * 0.157 + Math.sin(t * 2 + i) * 0.1;
          const rad = 55 + Math.random() * 80;
          const px = Math.cos(angle) * rad;
          const py = Math.sin(angle) * rad;
          const bright = Math.random();
          const hue = bright > 0.5 ? (280 + Math.random() * 50) : (30 + Math.random() * 30);
          ctx.fillStyle = `hsla(${hue}, 70%, 75%, ${0.3 + bright * 0.4})`;
          ctx.beginPath(); ctx.arc(px, py, 0.5 + bright * 1.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();

        ctx.restore(); // End translate

        // === EVENT HORIZON (black center) ===
        const ehGrad = ctx.createRadialGradient(cx, cy, holeR * 0.4, cx, cy, holeR + 8);
        ehGrad.addColorStop(0, 'rgba(0, 0, 0, 1)');
        ehGrad.addColorStop(0.7, 'rgba(0, 0, 5, 0.98)');
        ehGrad.addColorStop(1, 'rgba(5, 2, 15, 0.6)');
        ctx.fillStyle = ehGrad;
        ctx.beginPath(); ctx.arc(cx, cy, holeR + 5, 0, Math.PI * 2); ctx.fill();

        // === PHOTON SPHERE EDGE ===
        ctx.strokeStyle = `rgba(200, 180, 160, ${0.25 + Math.sin(t * 3) * 0.08})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(cx, cy, holeR + 8, 0, Math.PI * 2); ctx.stroke();

        // === PROGRESS RING ===
        if (showProgress && transferProgress > 0) {
          ctx.save();
          ctx.strokeStyle = transferState === 'sending' ? 'rgba(140, 200, 255, 0.7)' : 'rgba(255, 180, 100, 0.7)';
          ctx.lineWidth = 3; ctx.shadowBlur = 12;
          ctx.shadowColor = transferState === 'sending' ? 'rgba(140, 200, 255, 0.5)' : 'rgba(255, 180, 100, 0.5)';
          ctx.beginPath(); ctx.arc(cx, cy, holeR + 16, -Math.PI / 2, -Math.PI / 2 + transferProgress * Math.PI * 2); ctx.stroke();
          ctx.shadowBlur = 0; ctx.restore();
        }

        // === INTAKE THUMBNAIL SPIRAL ===
        if (isIntaking && transferThumbnail) {
          ctx.save();
          const scale = Math.max(0.05, 1 - intakeP);
          const angle = intakeP * Math.PI * 6;
          const dist = (1 - intakeP) * 130;
          ctx.globalAlpha = Math.max(0, 1 - intakeP * 1.3);
          ctx.translate(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist);
          ctx.rotate(angle * 0.5); ctx.scale(scale, scale);
          ctx.drawImage(transferThumbnail, -30, -30, 60, 60);
          ctx.restore();
        }
        if (isIntaking && !transferThumbnail) {
          ctx.save();
          const scale = Math.max(0.05, 1 - intakeP);
          const angle = intakeP * Math.PI * 6;
          const dist = (1 - intakeP) * 130;
          ctx.globalAlpha = Math.max(0, 1 - intakeP * 1.3);
          ctx.translate(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist);
          ctx.rotate(angle * 0.3); ctx.scale(scale, scale);
          ctx.fillStyle = 'rgba(200, 180, 255, 0.8)'; ctx.fillRect(-15, -20, 30, 40);
          ctx.fillStyle = 'rgba(140, 120, 200, 0.9)'; ctx.fillRect(-15, -20, 30, 10);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; ctx.font = '8px Courier New'; ctx.textAlign = 'center';
          ctx.fillText(transferFileName.split('.').pop().toUpperCase().slice(0, 4), 0, 8);
          ctx.restore();
        }
      }

      // ============================================================
      //  DRAWING: SPACETIME FABRIC BRIDGE (wireframe tube)
      // ============================================================
      function bezierPt(p0, c, p2, u) {
        const a = 1 - u;
        return { x: a * a * p0.x + 2 * a * u * c.x + u * u * p2.x, y: a * a * p0.y + 2 * a * u * c.y + u * u * p2.y };
      }
      function bezierTan(p0, c, p2, u) {
        return { x: 2 * (1 - u) * (c.x - p0.x) + 2 * u * (p2.x - c.x), y: 2 * (1 - u) * (c.y - p0.y) + 2 * u * (p2.y - c.y) };
      }

      let lastBridgeCtrl = null;

      function drawBridge(localA, localB, tension) {
        const dx = localB.x - localA.x, dy = localB.y - localA.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 30) return;

        const nx = -dy / dist, ny = dx / dist;
        const bend = clamp(dist * 0.12, 40, 200) * (0.5 + tension * 0.5);
        const midX = (localA.x + localB.x) * 0.5 + nx * Math.sin(t * 0.8) * bend * 0.3;
        const midY = (localA.y + localB.y) * 0.5 + ny * Math.cos(t * 0.6) * bend * 0.25;
        const ctrl = { x: midX, y: midY };
        const p0 = { x: localA.x, y: localA.y };
        const p2 = { x: localB.x, y: localB.y };
        lastBridgeCtrl = { p0, ctrl, p2 };

        // === SPACETIME WIREFRAME TUBE ===
        // This creates the Einstein-Rosen bridge look from the reference image
        const segments = 28;          // Number of cross-section ellipses
        const longiLines = 14;       // Longitudinal lines along the tube

        // Calculate cross-section points along the bezier
        const crossSections = [];
        for (let i = 0; i <= segments; i++) {
          const u = i / segments;
          const pt = bezierPt(p0, ctrl, p2, u);
          const tan = bezierTan(p0, ctrl, p2, u);
          const len = Math.max(0.001, Math.hypot(tan.x, tan.y));
          const tnx = -tan.y / len, tny = tan.x / len;

          // Tube radius: wide at ends, pinched in the middle (like the reference)
          const pinch = Math.sin(u * Math.PI); // 0 at ends, 1 in middle
          const baseRadius = 55 + tension * 15;
          const radius = baseRadius * (0.25 + 0.75 * (1 - pinch * 0.7));

          crossSections.push({ pt, tnx, tny, radius, u });
        }

        // Draw longitudinal curves (the lines running along the length)
        const isTransferring = transferState === 'sending' || transferState === 'receiving';
        const wireAlpha = isTransferring ? 0.35 : 0.2;
        const wireColor = isTransferring
          ? `rgba(200, 180, 255, ${wireAlpha})`
          : `rgba(200, 200, 220, ${wireAlpha})`;

        for (let l = 0; l < longiLines; l++) {
          const angle = (l / longiLines) * Math.PI * 2 + t * 0.15;
          ctx.strokeStyle = wireColor;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          for (let i = 0; i <= segments; i++) {
            const cs = crossSections[i];
            // Project the 3D tube onto 2D — we use the cross-section normal to offset,
            // and scale the Y component to simulate perspective tilt
            const offX = Math.cos(angle) * cs.radius;
            const offY = Math.sin(angle) * cs.radius * 0.35; // Perspective squish
            const px = cs.pt.x + cs.tnx * offX + cs.tnx * offY;
            const py = cs.pt.y + cs.tny * offX + cs.tny * offY;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
          ctx.stroke();
        }

        // Draw cross-section ellipses (rings along the tube)
        for (let i = 0; i <= segments; i++) {
          const cs = crossSections[i];
          // Only draw every other ring to avoid clutter
          if (i % 2 !== 0 && i !== 0 && i !== segments) continue;

          const alpha = wireAlpha * (0.5 + 0.5 * (1 - Math.abs(cs.u - 0.5) * 2));
          ctx.strokeStyle = isTransferring
            ? `rgba(200, 180, 255, ${alpha})`
            : `rgba(200, 200, 220, ${alpha})`;
          ctx.lineWidth = 0.7;
          ctx.beginPath();

          // Draw ellipse cross-section perpendicular to the bezier path
          for (let a = 0; a <= 24; a++) {
            const angle = (a / 24) * Math.PI * 2;
            const offX = Math.cos(angle) * cs.radius;
            const offY = Math.sin(angle) * cs.radius * 0.35;
            const px = cs.pt.x + cs.tnx * offX + cs.tnx * offY;
            const py = cs.pt.y + cs.tny * offX + cs.tny * offY;
            if (a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.stroke();
        }

        // === SOFT INNER GLOW along the tube (subtle light inside the funnel) ===
        for (let i = 0; i < segments; i += 3) {
          const cs = crossSections[i];
          const glowAlpha = isTransferring ? 0.08 : 0.03;
          const rg = ctx.createRadialGradient(cs.pt.x, cs.pt.y, 0, cs.pt.x, cs.pt.y, cs.radius * 0.6);
          rg.addColorStop(0, `rgba(180, 160, 255, ${glowAlpha})`);
          rg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = rg;
          ctx.beginPath(); ctx.arc(cs.pt.x, cs.pt.y, cs.radius * 0.6, 0, Math.PI * 2); ctx.fill();
        }

        // === SCATTERED PARTICLES traveling through the tube ===
        for (let i = 0; i < streamCount; i++) {
          const s = streams[i];
          s.f = (s.f + s.speed * 0.003) % 1;
          const u = s.f;
          const b = bezierPt(p0, ctrl, p2, u);
          const tan = bezierTan(p0, ctrl, p2, u);
          const len = Math.max(0.001, Math.hypot(tan.x, tan.y));
          const nnx = -tan.y / len, nny = tan.x / len;

          const pinch = Math.sin(u * Math.PI);
          const maxOff = (55 + tension * 15) * (0.25 + 0.75 * (1 - pinch * 0.7)) * 0.3;
          const warp = Math.sin((u * 14) + t * 4 + s.phase) * s.r * maxOff;
          const px = b.x + nnx * warp, py = b.y + nny * warp;

          const sparkle = 0.45 + 0.55 * Math.sin(t * 5 + s.phase);
          const a = clamp(0.12 + tension * 0.4 * sparkle, 0.08, 0.6);
          const hue = u < 0.5 ? (260 + u * 80) : (300 + (u - 0.5) * 60);
          ctx.fillStyle = `hsla(${hue}, 50%, 75%, ${a})`;
          ctx.fillRect(px, py, s.size, s.size);
        }

        // === FILE PACKET TRAVELING ALONG BRIDGE ===
        if (bridgePacketT >= 0 && bridgePacketT <= 1) {
          const packetU = bridgePacketDir === 1 ? bridgePacketT : (1 - bridgePacketT);
          const pp = bezierPt(p0, ctrl, p2, packetU);

          // Outer glow
          ctx.save();
          const glowR = 30 + Math.sin(t * 6) * 6;
          const pg = ctx.createRadialGradient(pp.x, pp.y, 3, pp.x, pp.y, glowR);
          pg.addColorStop(0, 'rgba(255, 250, 230, 0.9)');
          pg.addColorStop(0.25, 'rgba(200, 160, 255, 0.5)');
          pg.addColorStop(0.5, 'rgba(140, 100, 220, 0.2)');
          pg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = pg;
          ctx.beginPath(); ctx.arc(pp.x, pp.y, glowR, 0, Math.PI * 2); ctx.fill();

          // Core orb
          ctx.fillStyle = 'rgba(255, 250, 240, 0.95)';
          ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(200, 170, 255, 0.8)';
          ctx.beginPath(); ctx.arc(pp.x, pp.y, 7, 0, Math.PI * 2); ctx.fill();
          ctx.shadowBlur = 0;

          // Trail
          for (let i = 0; i < 10; i++) {
            const trailU = clamp(packetU - i * 0.012 * bridgePacketDir, 0, 1);
            const tp = bezierPt(p0, ctrl, p2, trailU);
            ctx.fillStyle = `rgba(200, 180, 255, ${0.5 - i * 0.045})`;
            ctx.beginPath();
            ctx.arc(tp.x + (Math.random() - 0.5) * 6, tp.y + (Math.random() - 0.5) * 6, 2.5 - i * 0.2, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      // === EMERGE PARTICLES ===
      function drawEmergeParticles(portalLocal) {
        for (const p of emergeParticles) {
          if (p.life <= 0) continue;
          ctx.fillStyle = `hsla(${p.hue}, 60%, 70%, ${p.life * 0.8})`;
          ctx.shadowBlur = 4; ctx.shadowColor = `hsla(${p.hue}, 60%, 70%, 0.4)`;
          ctx.beginPath();
          ctx.arc(portalLocal.x + p.x, portalLocal.y + p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.shadowBlur = 0;
      }

      // ============================================================
      //  MAIN LOOP
      // ============================================================
      let last = performance.now();
      function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now; t += dt;

        const peer = getNearestPeer(Date.now());
        const selfWorld = getWindowCenterWorld();
        const peerWorld = peer ? { x: peer.x, y: peer.y } : { x: selfWorld.x + 500, y: selfWorld.y };
        const localSelf = worldToLocal(selfWorld.x, selfWorld.y);
        const localPeer = worldToLocal(peerWorld.x, peerWorld.y);
        const worldDist = Math.hypot(peerWorld.x - selfWorld.x, peerWorld.y - selfWorld.y);
        const tension = peer ? clamp(1.35 - worldDist / 1300, 0.2, 1.25) : 0.15;

        // Update peer status
        if (peer) {
          peerStatusEl.innerHTML = `<span class="dot on"></span>PEER CONNECTED`;
        } else {
          peerStatusEl.innerHTML = `<span class="dot off"></span>NO PEER — OPEN ANOTHER TAB`;
        }

        // Update animations
        if (transferState === 'intake') {
          intakeTimer += dt;
          if (intakeTimer >= INTAKE_DURATION) startSending();
        }
        if (bridgePacketT >= 0) {
          bridgePacketT += dt * 0.45;
          if (bridgePacketT > 1) bridgePacketT = -1;
        }
        if (transferState === 'emerge') {
          emergeTimer += dt;
          for (const p of emergeParticles) {
            p.x += p.vx * dt * 60; p.y += p.vy * dt * 60;
            p.vx *= 0.96; p.vy *= 0.96; p.life -= dt * 0.7;
          }
          if (emergeTimer >= EMERGE_DURATION) displayReceivedFile();
        }

        // === DRAW ===
        ctx.clearRect(0, 0, w, h);
        drawBackground();
        drawStars(localSelf, localPeer, tension);

        if (peer) drawBridge(localSelf, localPeer, tension);

        const selfIntaking = transferState === 'intake' || transferState === 'sending';
        const selfEmerging = transferState === 'emerge';
        const intP = selfIntaking ? clamp(intakeTimer / INTAKE_DURATION, 0, 1) : 0;
        const emP = selfEmerging ? clamp(emergeTimer / EMERGE_DURATION, 0, 1) : 0;
        const showProg = transferState === 'sending' || transferState === 'receiving';

        drawBlackHole(localSelf.x, localSelf.y, t * 1.4, selfIntaking, intP, selfEmerging, emP, showProg);
        if (peer) drawBlackHole(localPeer.x, localPeer.y, -t * 1.35, false, 0, false, 0, false);

        if (transferState === 'emerge') drawEmergeParticles(localSelf);

        requestAnimationFrame(loop);
      }

      // === INIT ===
      resize(); initStars(); initStreams();
      window.addEventListener("resize", () => { resize(); initStars(); });
      setInterval(postState, 55); postState();
      requestAnimationFrame(loop);
      window.addEventListener("beforeunload", () => { if (bc) bc.close(); });
    })();
  </script>
</body>
